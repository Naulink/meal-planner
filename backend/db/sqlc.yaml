version: "2"
sql:
  - engine: "postgresql"
    schema: "./migrations"
    queries: "./query"
    gen:
      go:
        package: db
        out: gen
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "float64"