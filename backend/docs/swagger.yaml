            items:
              $ref: '#/definitions/internal_api.MealPlanEntryIngredientResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Add ingredient to a customized entry
      tags:
      - meal-plan
  /meal-plan/{id}/ingredients/{ingredientId}:
    delete:
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: Ingredient ID
        in: path
        name: ingredientId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Remove an override ingredient
      tags:
      - meal-plan
    put:
      consumes:
      - application/json
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: Ingredient ID
        in: path
        name: ingredientId
        required: true
        type: integer
      - description: Update data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.UpdateEntryIngredientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.MealPlanEntryIngredientResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update an override ingredient's amount and unit
      tags:
      - meal-plan
  /meal-plan/day/{dayIndex}:
    delete:
      parameters:
      - description: Day Index (>= 1)
        in: path
        name: dayIndex
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete all entries for a specific day and reindex subsequent days
      tags:
      - meal-plan
  /persons:
