host: localhost:8080
info:
  contact: {}
  description: Meal planner backend
  title: Meal Planner API
  version: "1.0"
paths:
  /ingredients:
    get:
      description: Returns all ingredients, with optional search/filter params
      parameters:
      - description: Search by name
        in: query
        name: search
        type: string
      - description: Comma-separated tag ID filter (AND logic)
        in: query
        name: tags
        type: string
      - description: Minimum kcal per 100g
        in: query
        name: min_kcal
        type: number
      - description: Maximum kcal per 100g
        in: query
        name: max_kcal
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.IngredientResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: List all ingredients
      tags:
      - ingredients
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingredient
        in: body
        name: ingredient
        required: true
        schema:
          $ref: '#/definitions/internal_api.CreateIngredientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api.IngredientResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create ingredient
      tags:
      - ingredients
  /ingredients/{id}:
    delete:
      parameters:
      - description: Ingredient ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
      summary: Delete ingredient
      tags:
      - ingredients
    put:
      consumes:
      - application/json
      parameters:
      - description: Ingredient ID
        in: path
        name: id
        required: true
        type: integer
      - description: Ingredient
        in: body
        name: ingredient
        required: true
        schema:
          $ref: '#/definitions/internal_api.CreateIngredientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.IngredientResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update ingredient
      tags:
      - ingredients
  /ingredients/{id}/image:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Ingredient ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "413":
          description: Request Entity Too Large
          schema:
            type: string
        "415":
          description: Unsupported Media Type
          schema:
            type: string
      summary: Upload ingredient image
      tags:
      - ingredients
  /meal-plan:
    delete:
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete all meal plan entries (reset)
      tags:
      - meal-plan
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.MealPlanEntryResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: List all meal plan entries
      tags:
      - meal-plan
    post:
      consumes:
      - application/json
      parameters:
      - description: Entry
        in: body
        name: entry
        required: true
        schema:
          $ref: '#/definitions/internal_api.CreateMealPlanEntryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api.MealPlanEntryResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Add a meal plan entry
      tags:
      - meal-plan
  /meal-plan/{id}:
    delete:
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Remove a single meal plan entry
      tags:
      - meal-plan
    put:
      consumes:
      - application/json
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: Entry
        in: body
        name: entry
        required: true
        schema:
          $ref: '#/definitions/internal_api.UpdateMealPlanEntryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.MealPlanEntryResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a meal plan entry's serving grams or amount
      tags:
      - meal-plan
  /meal-plan/{id}/customize:
    post:
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
